<div class="crear-admin-container">

  <!-- ===== Header ===== -->
  <div class="page-header">
    <div class="page-header-left">
      <span class="page-eyebrow">Coordinador · Usuarios</span>
      <h1>Crear administrativo</h1>
      <p>Registra un nuevo usuario administrativo en el sistema.</p>
    </div>
    <button class="btn-outline" type="button" (click)="volverAlListado()" [disabled]="loading">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="15 18 9 12 15 6"/>
      </svg>
      Volver
    </button>
  </div>

  <!-- ===== Form Card ===== -->
  <div class="form-card">

    <div class="form-card-header">
      <span class="form-card-title">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
          <circle cx="8.5" cy="7" r="4"/>
          <line x1="20" y1="8" x2="20" y2="14"/>
          <line x1="23" y1="11" x2="17" y2="11"/>
        </svg>
        Datos del nuevo administrativo
      </span>
    </div>

    <div class="form-body">

      <!-- Nombre + Apellido -->
      <div class="form-row">
        <div class="field-group">
          <label for="nombre">Nombre</label>
          <div class="input-wrapper">
            <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
            </svg>
            <input id="nombre" name="nombre" type="text" [(ngModel)]="form.nombre"
                   [disabled]="loading" placeholder="Ej. Laura"/>
          </div>
        </div>

        <div class="field-group">
          <label for="apellido">Apellido</label>
          <div class="input-wrapper">
            <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
            </svg>
            <input id="apellido" name="apellido" type="text" [(ngModel)]="form.apellido"
                   [disabled]="loading" placeholder="Ej. Martínez"/>
          </div>
        </div>
      </div>

      <!-- Email -->
      <div class="field-group">
        <label for="email">Correo institucional</label>
        <div class="input-wrapper">
          <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <rect x="2" y="4" width="20" height="16" rx="2"/><path d="M2 7l10 7 10-7"/>
          </svg>
          <input id="email" name="email" type="email" [(ngModel)]="form.email"
                 [disabled]="loading" placeholder="correo@uniquindio.edu.co"/>
        </div>
      </div>

      <!-- Identificación -->
      <div class="field-group">
        <label for="identificacion">Identificación</label>
        <div class="input-wrapper">
          <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="5" width="18" height="14" rx="2"/>
            <path d="M7 9h4M7 13h2"/>
            <circle cx="16" cy="11" r="2"/>
          </svg>
          <input id="identificacion" name="identificacion" type="text" [(ngModel)]="form.identificacion"
                 [disabled]="loading" placeholder="Número de cédula"/>
        </div>
      </div>

      <!-- Divider -->
      <div class="form-divider"><span>Credenciales de acceso</span></div>

      <!-- Password + Confirmar -->
      <div class="form-row">
        <div class="field-group">
          <label for="password">Contraseña</label>
          <div class="input-wrapper">
            <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <rect x="5" y="11" width="14" height="10" rx="2"/><path d="M8 11V7a4 4 0 0 1 8 0v4"/>
            </svg>
            <input id="password" name="password" type="password" [(ngModel)]="form.password"
                   [disabled]="loading" placeholder="Mínimo 6 caracteres"/>
          </div>
        </div>

        <div class="field-group">
          <label for="confirmarPassword">Confirmar contraseña</label>
          <div class="input-wrapper">
            <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <rect x="5" y="11" width="14" height="10" rx="2"/>
              <path d="M8 11V7a4 4 0 0 1 8 0v4"/>
              <path d="M9 16l2 2 4-4" stroke-width="2"/>
            </svg>
            <input id="confirmarPassword" name="confirmarPassword" type="password"
                   [(ngModel)]="form.confirmarPassword" [disabled]="loading" placeholder="Repite la contraseña"/>
          </div>
        </div>
      </div>

      <!-- Actions -->
      <div class="form-actions">
        <button class="btn-ghost" type="button" (click)="volverAlListado()" [disabled]="loading">
          Cancelar
        </button>
        <button class="btn-submit" type="button" (click)="crearAdministrativo()" [disabled]="loading">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
            <circle cx="8.5" cy="7" r="4"/>
            <line x1="20" y1="8" x2="20" y2="14"/>
            <line x1="23" y1="11" x2="17" y2="11"/>
          </svg>
          {{ loading ? 'Creando...' : 'Crear administrativo' }}
        </button>
      </div>

    </div>
  </div>

</div>
