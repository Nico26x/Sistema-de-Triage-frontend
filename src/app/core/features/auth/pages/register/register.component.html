<div class="register-card">
  <h1>Registro de Estudiante</h1>
  <form (ngSubmit)="onSubmit()" #registerForm="ngForm">
    <div class="field-group">
      <label for="nombre">Nombre</label>
      <input id="nombre" name="nombre" type="text" [(ngModel)]="nombre" required />
    </div>

    <div class="field-group">
      <label for="email">Correo</label>
      <input id="email" name="email" type="email" [(ngModel)]="email" required />
    </div>
    <div class="field-group">
      <label for="identificacion">Identificación</label>
      <input id="identificacion" name="identificacion" type="text" [(ngModel)]="identificacion" required />
    </div>
    <div class="field-group">
      <label for="password">Contraseña</label>
      <input id="password" name="password" type="password" [(ngModel)]="password" required />
    </div>
    <div class="field-group">
      <label for="confirmPassword">Confirmar Contraseña</label>
      <input id="confirmPassword" name="confirmPassword" type="password" [(ngModel)]="confirmPassword" required />
    </div>
    <button type="submit" [disabled]="loading">
      {{ loading ? 'Registrando...' : 'Registrarse' }}
    </button>
    <div *ngIf="error" class="error-message">{{ error }}</div>
    <div *ngIf="success" class="success-message">{{ success }}</div>
  </form>
  <p class="go-login">
    ¿Ya tienes cuenta? <a routerLink="/auth/login">Inicia sesión</a>
  </p>
</div>
