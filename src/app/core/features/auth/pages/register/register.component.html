<div class="register-card">

  <!-- Header -->
  <div class="register-header">
    <div class="register-logo">
      <svg viewBox="0 0 80 88" width="52" height="57" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M40 4 L74 16 L74 44 C74 63 58 78 40 84 C22 78 6 63 6 44 L6 16 Z" fill="#2e7d52"/>
        <path d="M40 10 L68 20 L68 44 C68 60 54 73 40 79 C26 73 12 60 12 44 L12 20 Z" fill="#256644"/>
        <line x1="40" y1="22" x2="40" y2="66" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="18" y1="44" x2="62" y2="44" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
        <circle cx="40" cy="34" r="7" fill="none" stroke="white" stroke-width="1.8"/>
        <circle cx="40" cy="34" r="2.5" fill="white"/>
        <path d="M30 55 Q35 50 40 55 Q45 50 50 55" fill="none" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <p class="register-eyebrow">Portal Académico</p>
    <h1>Registro de Estudiante</h1>
    <p class="register-subtitle">Crea tu cuenta para gestionar solicitudes</p>
  </div>

  <!-- Progress steps -->
  <div class="steps-bar">
    <div class="step active">
      <span class="step-dot">1</span>
      <span class="step-label">Datos personales</span>
    </div>
    <div class="step-line"></div>
    <div class="step">
      <span class="step-dot">2</span>
      <span class="step-label">Acceso</span>
    </div>
  </div>

  <!-- Form -->
  <form (ngSubmit)="onSubmit()" #registerForm="ngForm">

    <!-- Row: Nombre -->
    <div class="field-group">
      <label for="nombre">Nombre completo</label>
      <div class="input-wrapper">
        <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="8" r="4"/>
          <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
        </svg>
        <input id="nombre" name="nombre" type="text"
               [(ngModel)]="nombre" required placeholder="Ej. Laura Martínez Gómez"/>
      </div>
    </div>

    <!-- Row: Identificación -->
    <div class="field-group">
      <label for="identificacion">Número de identificación</label>
      <div class="input-wrapper">
        <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="5" width="18" height="14" rx="2"/>
          <path d="M7 9h4M7 13h2"/>
          <circle cx="16" cy="11" r="2"/>
          <path d="M13 15c0-1.1 1.3-2 3-2s3 .9 3 2"/>
        </svg>
        <input id="identificacion" name="identificacion" type="text"
               [(ngModel)]="identificacion" required placeholder="Cédula o código estudiantil"/>
      </div>
    </div>

    <!-- Row: Correo -->
    <div class="field-group">
      <label for="email">Correo institucional</label>
      <div class="input-wrapper">
        <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <rect x="2" y="4" width="20" height="16" rx="2"/>
          <path d="M2 7l10 7 10-7"/>
        </svg>
        <input id="email" name="email" type="email"
               [(ngModel)]="email" required placeholder="correo@universidad.edu.co"/>
      </div>
    </div>

    <!-- Divider visual -->
    <div class="form-divider">
      <span>Seguridad de acceso</span>
    </div>

    <!-- Row: Password -->
    <div class="field-group">
      <label for="password">Contraseña</label>
      <div class="input-wrapper">
        <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <rect x="5" y="11" width="14" height="10" rx="2"/>
          <path d="M8 11V7a4 4 0 0 1 8 0v4"/>
        </svg>
        <input id="password" name="password" type="password"
               [(ngModel)]="password" required placeholder="Mínimo 8 caracteres"/>
      </div>
    </div>

    <!-- Row: Confirm Password -->
    <div class="field-group">
      <label for="confirmPassword">Confirmar contraseña</label>
      <div class="input-wrapper">
        <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <rect x="5" y="11" width="14" height="10" rx="2"/>
          <path d="M8 11V7a4 4 0 0 1 8 0v4"/>
          <path d="M9 16l2 2 4-4" stroke-width="2"/>
        </svg>
        <input id="confirmPassword" name="confirmPassword" type="password"
               [(ngModel)]="confirmPassword" required placeholder="Repite tu contraseña"/>
      </div>
    </div>

    <!-- Submit -->
    <button type="submit" class="btn-primary" [disabled]="loading">
      {{ loading ? 'Registrando...' : 'Crear cuenta' }}
    </button>

    <!-- Feedback messages -->
    <div *ngIf="error" class="error-message">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
           stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/>
        <circle cx="12" cy="16" r=".5" fill="currentColor"/>
      </svg>
      {{ error }}
    </div>

    <div *ngIf="success" class="success-message">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
           stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"/><path d="M9 12l2 2 4-4"/>
      </svg>
      {{ success }}
    </div>

  </form>

  <!-- Go to login -->
  <p class="go-login">
    ¿Ya tienes cuenta? <a routerLink="/auth/login">Inicia sesión</a>
  </p>

</div>
