<div class="login-card">

  <!-- Header -->
  <div class="login-header">
    <div class="login-logo">
      <img src="logo-uniquindio.png">
    </div>
    <p class="login-eyebrow">Portal Académico</p>
    <h1>Solicitudes Académicas</h1>
    <p class="login-subtitle">Ingresa a tu cuenta para continuar</p>
  </div>

  <!-- Form -->
  <form (ngSubmit)="onSubmit()" #loginForm="ngForm">

    <div class="field-group">
      <label for="email">Correo institucional</label>
      <div class="input-wrapper">
        <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"
          stroke-linecap="round" stroke-linejoin="round">
          <rect x="2" y="4" width="20" height="16" rx="2" />
          <path d="M2 7l10 7 10-7" />
        </svg>
        <input id="email" name="email" type="email" [(ngModel)]="email" required
          placeholder="correo@universidad.edu.co" />
      </div>
    </div>

    <div class="field-group">
      <label for="password">Contraseña</label>
      <div class="input-wrapper">
        <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"
          stroke-linecap="round" stroke-linejoin="round">
          <rect x="5" y="11" width="14" height="10" rx="2" />
          <path d="M8 11V7a4 4 0 0 1 8 0v4" />
        </svg>
        <input id="password" name="password" type="password" [(ngModel)]="password" required placeholder="••••••••" />
      </div>
    </div>

    <button type="submit" class="btn-primary" [disabled]="loading">
      {{ loading ? 'Ingresando...' : 'Ingresar' }}
    </button>

  </form>

  <!-- Divider -->
  <div class="divider">
    <span>¿No tienes cuenta?</span>
  </div>

  <!-- Register button -->
  <a routerLink="/auth/register" class="btn-outline">
    Crear cuenta nueva
  </a>



  @if (error) {
  <p class="error-message">{{ error }}</p>
  }

</div>
