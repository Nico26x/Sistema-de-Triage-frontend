<div class="login-card">

  <!-- Logo -->
  <div class="login-logo">
    <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <!-- Stethoscope icon -->
      <path d="M4.5 12.5a7.5 7.5 0 0 0 7.5 7.5 5.5 5.5 0 0 0 5.5-5.5V9" stroke="white"/>
      <path d="M9 4.5A4.5 4.5 0 0 1 4.5 9" stroke="white"/>
      <circle cx="17.5" cy="8" r="2" fill="white" stroke="none"/>
    </svg>
  </div>

  <!-- Title -->
  <h1>Sistema de Triage</h1>
  <p class="login-subtitle">Ingresa a tu cuenta para continuar</p>

  <!-- Form -->
  <form (ngSubmit)="onSubmit()" #loginForm="ngForm">

    <!-- Email -->
    <div class="field-group">
      <label for="email">Correo</label>
      <div class="input-wrapper">
        <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <rect x="2" y="4" width="20" height="16" rx="2"/>
          <path d="M2 7l10 7 10-7"/>
        </svg>
        <input
          id="email"
          name="email"
          type="email"
          [(ngModel)]="email"
          required
          placeholder="nombre@hospital.com"
        />
      </div>
    </div>

    <!-- Password -->
    <div class="field-group">
      <label for="password">Contraseña</label>
      <div class="input-wrapper">
        <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <rect x="5" y="11" width="14" height="10" rx="2"/>
          <path d="M8 11V7a4 4 0 0 1 8 0v4"/>
        </svg>
        <input
          id="password"
          name="password"
          type="password"
          [(ngModel)]="password"
          required
          placeholder="••••••••"
        />
      </div>
    </div>

    <!-- Submit -->
    <button type="submit" [disabled]="loading">
      {{ loading ? 'Ingresando...' : 'Ingresar' }}
    </button>

  </form>

  <!-- Forgot password -->
  <p class="forgot-password">
    ¿Olvidaste tu contraseña? <a href="#">Recupérala aquí</a>
  </p>

  <!-- Error -->
  @if (error) {
    <p class="error-message">{{ error }}</p>
  }

</div>
