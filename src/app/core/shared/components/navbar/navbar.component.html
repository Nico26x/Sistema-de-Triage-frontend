<nav aria-label="Main navigation">
  <div class="navbar-container">

    <!-- Logo / Brand -->
    <div class="navbar-brand">
      <div class="nav-logo-custom">
        <svg width="42" height="42" viewBox="0 0 64 64" fill="none">
          <circle cx="32" cy="32" r="30" fill="#0B6E4F" />
          <path d="M20 18V38C20 46 25 50 32 50C39 50 44 46 44 38V18" stroke="white" stroke-width="4"
            stroke-linecap="round" />
          <path d="M26 26V37C26 41 28 44 32 44C36 44 38 41 38 37V26" stroke="#FFD54F" stroke-width="4"
            stroke-linecap="round" />
        </svg>
      </div>
      <div class="nav-brand-text">
        <span class="nav-brand-title">Portal Académico</span>
        <span class="nav-brand-sub">Universidad del Quindío</span>
      </div>
    </div>

    <!-- Main Navigation Menu -->
    <div class="navbar-menu" role="menubar">
      <a routerLink="/dashboard" class="nav-link" role="menuitem" routerLinkActive="nav-link--active"
        [routerLinkActiveOptions]="{exact:true}">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="7" height="7" />
          <rect x="14" y="3" width="7" height="7" />
          <rect x="3" y="14" width="7" height="7" />
          <rect x="14" y="14" width="7" height="7" />
        </svg>
        Panel
      </a>

      <a routerLink="/dashboard/solicitudes" class="nav-link" role="menuitem" routerLinkActive="nav-link--active">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
          <polyline points="14 2 14 8 20 8" />
          <line x1="9" y1="13" x2="15" y2="13" />
          <line x1="9" y1="17" x2="12" y2="17" />
        </svg>
        Solicitudes
      </a>

      <!-- Admin-only -->
      <a *ngIf="isAdminRole()" routerLink="/dashboard/triages" class="nav-link" role="menuitem"
        routerLinkActive="nav-link--active">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <polyline points="17 1 21 5 17 9" />
          <path d="M3 11V9a4 4 0 0 1 4-4h14" />
          <polyline points="7 23 3 19 7 15" />
          <path d="M21 13v2a4 4 0 0 1-4 4H3" />
        </svg>
        Gestión de Triages
      </a>

      <!-- Coordinator-only -->
      <ng-container *ngIf="isCoordinatorRole()">
        <a routerLink="/dashboard/usuarios" class="nav-link" role="menuitem" routerLinkActive="nav-link--active">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" />
            <circle cx="9" cy="7" r="4" />
            <path d="M23 21v-2a4 4 0 0 0-3-3.87" />
            <path d="M16 3.13a4 4 0 0 1 0 7.75" />
          </svg>
          Usuarios
        </a>
      </ng-container>
    </div>

    <!-- User Info & Logout -->
    <div class="navbar-right">
      <div class="user-info" *ngIf="userEmail">
        <span class="user-email">{{ userEmail }}</span>
        <span class="user-role-badge" [ngClass]="{
            'badge-estudiante': currentRole === 'ESTUDIANTE',
            'badge-admin':      currentRole === 'ADMINISTRATIVO',
            'badge-coord':      currentRole === 'COORDINADOR'
          }">
          {{ currentRole | titlecase }}
        </span>
      </div>

      <button class="btn-logout" (click)="logout()" type="button" aria-label="Cerrar sesión">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
          <polyline points="16 17 21 12 16 7" />
          <line x1="21" y1="12" x2="9" y2="12" />
        </svg>
        Cerrar sesión
      </button>
    </div>

  </div>
</nav>
